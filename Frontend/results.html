<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">

    <title>SQentineL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body>
    <div id="particles-js" class="bubbles">    </div>



    <div class="container" style="position: relative; z-index: 4;">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
                <svg class="bi me-2" width="40" height="32" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg>
                <span class="fs-4"><h4>SQentineL</h4></span>
            </a> <ul class="nav nav-pills">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="results.html" class="nav-link active" aria-current="page">Output</a></li>
            </ul>
        </header>
    </div>

    <div class="container d-flex justify-content-center align-items-center" style="position: relative; z-index: 4">
        <div class="d-flex flex-column justify-content-center align-items-center w-75" id="results">
            <div class="box d-flex flex-row"><h1>Here Are Your Results:</h1></div>
            <h5 id="safe-div" class="p-2 box flex-row rounded">Your SQL is safe! Good job!</h5>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="output.js"></script>

</body>




<style>
    #messageBox {
        min-width: 75%;
        min-height: 40px;
        resize: none; /* Prevent manual drag resize */
        overflow: hidden; /* Hide scrollbar */
        font-size: 16px;
        padding: 8px;
        box-sizing: border-box;
    }

    #particles-js {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1; /* keeps it behind other content */
    }

    #safe-div {
        display: none;
        border-style: solid;
        background-color: lightgreen;
    }

    .info-div-body {
        border-left-style: solid;
        border-right-style: solid;
        border-bottom-style: solid;
        padding: 20px;
    }

    .info-div-header {
        min-width: 50vw;
    }

    .hidden-box {
        display: none;
    }

    .info-div-header {
        border-style: solid;
    }

    .active-caret {
        display: block;
    }

    .inactive-caret {
        display: none;
    }

    body {
        background: #0082c9 linear-gradient(350deg,#245167,#006fab);
        position: relative;
        z-index: 0;
        min-height: 100vh;        
        align-items: center;
    
    }
    .bubbles{
        position: relative;
        z-index:-1;
    }
    h1{
        color: white;
    }
    h4{
        color: white;
    }
</style>

<script>
    particlesJS("particles-js", {
        "particles": {
            "number": {
                "value": 170,
                "density": {
                    "enable": true,
                    "value_area": 800
                }
            },
            "color": {
                "value": "#ffffff"
            },
            "shape": {
                "type": "circle",
                "stroke": {
                    "width": 0,
                    "color": "#000000"
                },
                "polygon": {
                    "nb_sides": 5
                },
                "image": {
                    "src": "img/github.svg",
                    "width": 100,
                    "height": 100
                }
            },
            "opacity": {
                "value": 0.5,
                "random": false,
                "anim": {
                    "enable": false,
                    "speed": 1,
                    "opacity_min": 0.1,
                    "sync": false
                }
            },
            "size": {
                "value": 3,
                "random": true,
                "anim": {
                    "enable": false,
                    "speed": 40,
                    "size_min": 0.1,
                    "sync": false
                }
            },
            "line_linked": {
                "enable": false,
                "distance": 150,
                "color": "#ffffff",
                "opacity": 0.4,
                "width": 1
            },
            "move": {
                "enable": true,
                "speed": 1,
                "direction": "top",
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false,
                "attract": {
                    "enable": false,
                    "rotateX": 600,
                    "rotateY": 1200
                }
            }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": {
                "onhover": {
                    "enable": false,
                    "mode": "repulse"
                },
                "onclick": {
                    "enable": true,
                    "mode": "push"
                },
                "resize": true
            },
            "modes": {
                "grab": {
                    "distance": 400,
                    "line_linked": {
                        "opacity": 1
                    }
                },
                "bubble": {
                    "distance": 400,
                    "size": 40,
                    "duration": 2,
                    "opacity": 8,
                    "speed": 3
                },
                "repulse": {
                    "distance": 200,
                    "duration": 0.4
                },
                "push": {
                    "particles_nb": 4
                },
                "remove": {
                    "particles_nb": 2
                }
            }
        },
        "retina_detect": true
    });
