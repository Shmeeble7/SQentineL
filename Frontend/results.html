<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">

    <title>SQentineL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <div class="container">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
                <svg class="bi me-2" width="40" height="32" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg>
                <span class="fs-4">SQentineL</span>
            </a> <ul class="nav nav-pills">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="results.html" class="nav-link active" aria-current="page">Output</a></li>
            </ul>
        </header>

    </div>
</head>

<body>

    <div class="container d-flex w-75" id="results">
        <div class="box d-flex flex-row "><h1>Here are your Results:</h1></div>
    </div>

    <div class="d-flex flex-column">
        <div class="p-2">
            <h3>Line</h3>
            <p id="line"></p>
        </div>
        <div class="p-2">
            <h3>Rule ID</h3>
            <p id="rule_id"></p>
        </div>
        <div class="p-2">
            <h3>Severity</h3>
            <p id="severity"></p>
        </div>
        <div class="p-2">
            <h3>Confidence</h3>
            <p id="confidence"></p>
        </div>
        <div class="p-2">
            <h3>Title</h3>
            <p id="title"></p>
        </div>
        <div class="p-2">
            <h3>Explanation</h3>
            <p id="explanation"></p>
        </div>
        <div class="p-2">
            <h3>Danger</h3>
            <p id="danger"></p>
        </div>
        <div class="p-2">
            <h3>Fix</h3>
            <p id="fix"></p>
        </div>
        <div class="p-2">
            <h3>Example Payload</h3>
            <p id="example_payload"></p>
        </div>
        <div class="p-2">
            <h3>Example Fix</h3>
            <p id="example_fix"></p>
        </div>
        <div class="p-2">
            <h3>Code Snippet</h3>
            <p id="code_snippet"></p>
        </div>

    </div>
</body>



<script src="output.js"></script>

<style>
    #messageBox {
        min-width: 75%;
        min-height: 40px;
        resize: none; /* Prevent manual drag resize */
        overflow: hidden; /* Hide scrollbar */
        font-size: 16px;
        padding: 8px;
        box-sizing: border-box;
    }

    .element {
        background-image: url('backgroundAsset.jpg');
        background-repeat: repeat;
        background-size: 100px 100px; /* Adjust size to control tiling */
    }
