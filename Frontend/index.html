<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">

    <title>SQentineL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">




</head>

<body>


    <div class="banner" id="home">
        <div class="container">
            <div class="row banner-text">

                <div class="slider-info">
                    <div id="particles-js"></div>
                    <div class="mt-lg-5 d-flex align-items-center p-4">

                        <div>
                            <h2 class="mb-2">SQentineL</h2>
                            <p class="mb-0">An education-oriented SAST tool for Python.</p>
                        </div>

                        <div class="ms-auto">
                            <img src="Assets/Squid.png"
                                 alt="SQentineL Squid Logo"
                                 class="img-fluid"
                                 style="max-width: 75%;">
                        </div>

                    </div>
                </div>
            </div>
            <header class="d-flex py-3 mb-4">
                <ul class="nav nav-pills ms-auto">
                    <li class="nav-item"><a href="index.html" class="nav-link active-link">Home</a></li>
                    <li class="nav-item"><a href="results.html" class="nav-link">Output</a></li>
                    <li class="nav-item"><a href="#features" class="nav-link">Features</a></li>
                    <li class="nav-item"><a href="#FAQs" class="nav-link">FAQs</a></li>
                    <li class="nav-item"><a href="#about" class="nav-link">About</a></li>
                </ul>
            </header>
        </div>

    </div>



    <div class="container d-flex w-75 mt-3 justify-content-center" id="submitCode">
        <div class="navy-txt fw-bolder box "><h1>Test Your Code Here!</h1></div>
    </div>


    <div class="mb-3 mt-3">
        <div class="d-flex justify-content-center">
            <textarea id="messageBox" rows="1" class="rounded" placeholder="Type or paste your code here . . . "></textarea>
        </div>

        <div class=" container d-flex w-75 mt-3 flex-row align-items-center justify-content-center g-5" id="submitCode">
            <div class="box mr-5">
                <button onclick="sendText()" class="btn navy-btn" type="button" id="sendBtn">Submit Code</button>
            </div>

                <div class="box ms-5 ps-5 ">
                    <input class ="ms-5 "type="file" id="fileInput" accept=".pdf,.jpg,.png, .txt" />
                    <div id="status"></div>
                </div>
            </div>




        </div>

    </div>


    <div class="container d-flex w-75" id="features">
        <div class="box"><h5>Provides Educational Feedback</h5></div>
    </div>
    <div class="container d-flex w-75" id="features">
        <div class="box"><p>Detects Command Line Injections</p></div>
    </div>



    <div class="container d-flex w-75" id="FAQs">
        <div class="box"><h1>FAQs</h1></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div class="container d-flex w-75" id="about">
        <div class="box"><h1>About</h1></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

</body>

<div class="container">
    <footer class="py-3 my-4">
        <ul class="nav justify-content-center border-bottom pb-3 mb-3">
            <li class="nav-item"><a href="#submitCode" class="nav-link px-2 text-body-secondary">Home</a></li>
            <li class="nav-item"><a href="#features" class="nav-link px-2 text-body-secondary">Features</a></li>
            <li class="nav-item"><a href="#FAQs" class="nav-link px-2 text-body-secondary">FAQs</a></li>
            <li class="nav-item"><a href="#about" class="nav-link px-2 text-body-secondary">About</a></li>
        </ul>
        <p class="text-center text-body-secondary">© 2026 SQentineL, Inc</p>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="script.js"></script>


<script>
    particlesJS("particles-js", {
        "particles": {
            "number": {
                "value": 170,
                "density": {
                    "enable": true,
                    "value_area": 800
                }
            },
            "color": {
                "value": "#ffffff"
            },
            "shape": {
                "type": "circle",
                "stroke": {
                    "width": 0,
                    "color": "#000000"
                },
                "polygon": {
                    "nb_sides": 5
                },
                "image": {
                    "src": "img/github.svg",
                    "width": 100,
                    "height": 100
                }
            },
            "opacity": {
                "value": 0.5,
                "random": false,
                "anim": {
                    "enable": false,
                    "speed": 1,
                    "opacity_min": 0.1,
                    "sync": false
                }
            },
            "size": {
                "value": 3,
                "random": true,
                "anim": {
                    "enable": false,
                    "speed": 40,
                    "size_min": 0.1,
                    "sync": false
                }
            },
            "line_linked": {
                "enable": false,
                "distance": 150,
                "color": "#ffffff",
                "opacity": 0.4,
                "width": 1
            },
            "move": {
                "enable": true,
                "speed": 1,
                "direction": "top",
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false,
                "attract": {
                    "enable": false,
                    "rotateX": 600,
                    "rotateY": 1200
                }
            }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": {
                "onhover": {
                    "enable": false,
                    "mode": "repulse"
                },
                "onclick": {
                    "enable": true,
                    "mode": "push"
                },
                "resize": true
            },
            "modes": {
                "grab": {
                    "distance": 400,
                    "line_linked": {
                        "opacity": 1
                    }
                },
                "bubble": {
                    "distance": 400,
                    "size": 40,
                    "duration": 2,
                    "opacity": 8,
                    "speed": 3
                },
                "repulse": {
                    "distance": 200,
                    "duration": 0.4
                },
                "push": {
                    "particles_nb": 4
                },
                "remove": {
                    "particles_nb": 2
                }
            }
        },
        "retina_detect": true
    });
</script>
<style>
    #messageBox {
        min-width: 75%;
        min-height: 40px;
        resize: none; /* Prevent manual drag resize */

        padding: 8px;
        box-sizing: border-box;
    }

    .banner {
        background: #0082c9 linear-gradient(350deg,#245167,#006fab);
        position: relative;
        z-index: 0;
        height: 100vh;
        align-items: center;
        display: flex;
    }

    h2 {
        color: #fff;
        display: flex;
        font-size: 3.5em;
        line-height: 65px;
        letter-spacing: 1px;
    }

    p {
        font-size: 16px;
        color: #ddd;
        margin: 0;
        align-items: center; /* Centers vertically */
    }
    h5{
        font-weight:bold;
    }
    h1 {
        font-weight: bold;
    }


    #particles-js {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: -1; /* keeps it behind other content */
    }
    .background{
        z-index: 3;
    }

    .navy-txt {
        color: #000035;
    }

    .nav-link {
        color: white;
    }

        .nav-link:hover {
            color: #000035;
        }

    .navy-btn {
        color: white;
        background-color: #000035;
        border: solid; 
        border-color: #000035;
    }

        .navy-btn:hover {
            color: #000035;
            background-color: white;
            border: solid;
            border-color: #000035;
        }

    .active-link {
        background-color: #000035;
        color: white;
    }

        .active-link:hover {
            background-color: #000035;
            color: white;
        }
</style>

</html>
